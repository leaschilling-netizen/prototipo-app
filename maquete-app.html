<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#534AB7">
<title>Protótipo & Amostras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e0deda;--text:#1a1a18;--muted:#888780;
  --maq:#534AB7;--maq-l:#EEEDFE;--maq-d:#3C3489;
  --amo:#1D9E75;--amo-l:#E1F5EE;--amo-d:#0F6E56;
  --warn:#BA7517;--warn-l:#FAEEDA;
  --danger:#E24B4A;--danger-l:#FCEBEB;
  --info:#378ADD;--info-l:#E6F1FB;
  --liberado:#1D9E75;--liberado-l:#E1F5EE;--liberado-d:#0F6E56;
  --active:#534AB7;--active-l:#EEEDFE;--active-d:#3C3489;
  --r:10px;--rl:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}

.topbar{background:var(--active-d);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600;color:#fff;display:flex;align-items:center;gap:7px}
.topbar-btns{display:flex;gap:6px}

.tabs{background:var(--active-d);padding:0 16px;border-bottom:2px solid rgba(255,255,255,.15);display:flex}
.tab{flex:1;text-align:center;padding:10px 8px;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#fff;border-bottom-color:#fff}

/* RESUMO */
.resumo{background:var(--active-d);padding:10px 16px 14px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.resumo::-webkit-scrollbar{display:none}
.r-card{background:rgba(255,255,255,.15);border-radius:8px;padding:7px 12px;text-align:center;flex-shrink:0;min-width:72px}
.r-num{font-size:20px;font-weight:600;color:#fff;line-height:1}
.r-lbl{font-size:10px;color:rgba(255,255,255,.75);margin-top:3px;font-weight:500;white-space:nowrap}
.r-card.liberado{background:rgba(29,158,117,.35)}
.r-card.andamento{background:rgba(255,255,255,.1)}

.userbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.userbar label{color:var(--muted);font-weight:500;white-space:nowrap}
.userbar input{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:150px}
.userbar input:focus{outline:none;border-color:var(--active)}

.btn{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--active);color:#fff;border-color:var(--active)}
.btn-green{background:#25D366;color:#fff;border-color:#25D366}
.btn-liberado{background:var(--liberado);color:#fff;border-color:var(--liberado)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 9px;font-size:14px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
.btn-danger{background:var(--danger-l);color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

.main{padding:14px;max-width:1400px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar h2{font-size:13px;font-weight:500;color:var(--muted);flex:1}

/* BUSCA com filtro coleção */
.search-area{margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.search-wrap{position:relative}
.search-wrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.search-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 36px;font-size:14px;font-family:inherit;background:#fff;color:var(--text)}
.search-input:focus{outline:none;border-color:var(--active)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);display:none}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-row label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.filter-select{border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);flex:1;min-width:0}
.filter-select:focus{outline:none;border-color:var(--active)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* CARD */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .3s,background .3s}
.card.liberado{border-color:var(--liberado);background:#f0faf6}
.card-header{padding:12px 13px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.card-img{width:80px;height:80px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img .hint{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;text-align:center}
.card-img:hover .hint,.card-img:active .hint{opacity:1}
.card-info{flex:1;min-width:0}
.card-ref{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.liberado-badge{background:var(--liberado-l);color:var(--liberado-d);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:2px}
.card-actions{display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.card-act{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
.card-act:hover{background:var(--bg)}
.card-act.danger{border-color:var(--danger);color:var(--danger)}

/* PROGRESSO PROTÓTIPOS */
.proto-progress{padding:10px 13px;border-bottom:1px solid var(--border)}
.proto-progress-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.proto-steps{display:flex;gap:4px}
.proto-step{flex:1;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:1.5px solid var(--border);color:var(--muted);background:var(--bg);cursor:default;position:relative;transition:all .2s}
.proto-step.feito{background:var(--maq-l);border-color:var(--maq);color:var(--maq-d)}
.proto-step.atual{background:var(--warn-l);border-color:var(--warn);color:var(--warn);font-weight:700}

.sec{padding:10px 13px;border-bottom:1px solid var(--border)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.sec-lbl span{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.d-info{background:var(--info)}.d-maq{background:var(--maq)}.d-amo{background:var(--amo)}

.obs-box{font-size:13px;line-height:1.55;background:var(--info-l);border-radius:7px;padding:8px 10px;color:#185FA5;min-height:36px;white-space:pre-wrap;word-break:break-word}
.obs-empty{color:var(--muted);font-style:italic;background:var(--bg)}

.protos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.proto-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.proto-img{width:100%;aspect-ratio:1;border-radius:7px;background:var(--bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;font-size:18px}
.proto-img img{width:100%;height:100%;object-fit:cover}
.proto-img .hint{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;text-align:center}
.proto-img:hover .hint,.proto-img:active .hint{opacity:1}
.proto-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.proto-obs{font-size:11px;color:#185FA5;background:var(--info-l);border-radius:5px;padding:4px 6px;width:100%;min-height:28px;word-break:break-word;line-height:1.4}
.proto-obs.empty{color:var(--muted);font-style:italic;background:var(--bg)}

/* LIBERAR BTN */
.liberar-sec{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.liberar-info{font-size:12px;color:var(--muted)}
.liberar-info.ok{color:var(--liberado-d);font-weight:600}

.cmt-sec{padding:10px 13px 12px}
.cmt-item{display:flex;gap:7px;margin-bottom:7px}
.avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmt-body{flex:1;background:var(--bg);border-radius:0 7px 7px 7px;padding:6px 9px}
.cmt-user{font-size:11px;font-weight:600;color:var(--maq);margin-bottom:1px}
.cmt-text{font-size:13px;line-height:1.4;word-break:break-word}
.cmt-time{font-size:10px;color:var(--muted);margin-top:2px}
.cmt-row{display:flex;gap:7px;margin-top:8px;align-items:center}
.cmt-input{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.cmt-input:focus{outline:none;border-color:var(--active)}
.more-btn{background:none;border:none;cursor:pointer;color:var(--info);font-size:12px;font-weight:500;padding:2px 0;font-family:inherit;display:block;margin-bottom:5px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--rl)}}
.modal-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hdr h3{font-size:15px;font-weight:600}
.modal-body{padding:14px 16px}
.modal-ftr{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--active)}
.fg textarea{resize:vertical;min-height:68px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.img-drop{width:100%;height:100px;border-radius:8px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;color:var(--muted);border:2px dashed var(--border);cursor:pointer;overflow:hidden;margin-bottom:5px;position:relative}
.img-drop img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-drop-lbl{font-size:11px;color:var(--muted);text-align:center;position:relative;z-index:1}
.sep{border:none;border-top:1px solid var(--border);margin:4px 0 12px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.protos-form{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:8px}
.pf-col{display:flex;flex-direction:column;gap:6px}
.pf-col-lbl{font-size:10px;font-weight:700;color:var(--maq);text-transform:uppercase;text-align:center}
.pf-img-sm{width:100%;aspect-ratio:1;border-radius:6px;background:var(--bg);border:1.5px dashed var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;font-size:16px}
.pf-img-sm img{width:100%;height:100%;object-fit:cover}
.pf-img-sm .hint{position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;text-align:center}
.pf-img-sm:hover .hint,.pf-img-sm:active .hint{opacity:1}
.pf-obs{width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 6px;font-size:11px;font-family:inherit;background:var(--bg);color:var(--text);resize:none;min-height:52px}
.pf-obs:focus{outline:none;border-color:var(--active)}
.fg-proto{margin-bottom:12px}
.fg-proto label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.fg-proto select{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}

.empty{text-align:center;padding:50px 20px;color:var(--muted);grid-column:1/-1}
.empty .ico{font-size:42px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--text)}
.import-banner{background:var(--maq-l);border:1px solid var(--maq);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--maq-d);display:none}
.import-banner strong{display:block;font-size:14px;margin-bottom:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:500px){.cards-grid{grid-template-columns:1fr}.protos-grid{grid-template-columns:repeat(3,1fr)}.protos-form{grid-template-columns:repeat(3,1fr)}.proto-steps{flex-wrap:wrap}}
</style>
</head>
<body>

<div class="topbar">
  <h1>👠 Protótipo & Amostras</h1>
  <div class="topbar-btns">
    <button class="btn btn-icon" onclick="compartilhar()" title="Compartilhar">📤</button>
    <button class="btn btn-icon" onclick="exportarJSON()" title="Backup">💾</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tabMaq" onclick="switchTab('maquete')">🧩 Protótipo</div>
  <div class="tab" id="tabAmo" onclick="switchTab('amostra')">✅ Amostras</div>
</div>

<div class="resumo" id="resumoBar"></div>

<div class="userbar">
  <label>Seu nome:</label>
  <input id="unInput" placeholder="Digite seu nome…" maxlength="30" onkeydown="if(event.key==='Enter')setUser()">
  <button class="btn btn-sm btn-accent" id="unBtn" onclick="setUser()">Entrar</button>
  <span id="unLabel" style="font-weight:600;color:var(--active);display:none"></span>
</div>

<div class="main">
  <div class="import-banner" id="importBanner">
    <strong>📥 Dados recebidos!</strong>
    <span id="importInfo"></span>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-accent btn-sm" onclick="confirmarImport()">Importar e mesclar</button>
      <button class="btn btn-sm" onclick="document.getElementById('importBanner').style.display='none'">Ignorar</button>
    </div>
  </div>
  <div class="toolbar">
    <h2 id="countLbl">0 registros</h2>
    <button class="btn btn-green btn-sm" onclick="compartilhar()">📤 Compartilhar</button>
    <button class="btn btn-accent" onclick="openNew()">+ Novo registro</button>
  </div>
  <div class="search-area">
    <div class="search-wrap">
      <span>🔍</span>
      <input class="search-input" id="searchInput" placeholder="Buscar por referência, coleção ou estilista…" oninput="renderCards()">
      <button class="search-clear" id="searchClear" onclick="document.getElementById('searchInput').value='';renderCards()">✕</button>
    </div>
    <div class="filter-row">
      <label>Coleção:</label>
      <select class="filter-select" id="filterColecao" onchange="renderCards()">
        <option value="">Todas</option>
      </select>
      <label style="margin-left:4px">Status:</label>
      <select class="filter-select" id="filterStatus" onchange="renderCards()">
        <option value="">Todos</option>
        <option value="andamento">Em andamento</option>
        <option value="liberado">Liberado p/ Amostras</option>
      </select>
    </div>
  </div>
  <div id="grid" class="cards-grid"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal principal -->
<div id="mCard" class="overlay" style="display:none" onclick="overlayClick(event,'mCard')">
 <div class="modal">
  <div class="modal-hdr"><h3 id="mCardTitle">Novo registro</h3><button class="btn btn-sm" onclick="closeM('mCard')">✕</button></div>
  <div class="modal-body">
    <div class="fg">
      <label>Foto principal</label>
      <div class="img-drop" id="imgDrop" onclick="document.getElementById('imgFile').click()">
        <span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>
      </div>
      <input type="file" id="imgFile" accept="image/*" onchange="onImgFile(event,'main')" style="display:none">
    </div>
    <div class="g2">
      <div class="fg"><label>Referência</label><input id="fRef" placeholder="Ex: 277-1440"></div>
      <div class="fg"><label>Coleção</label><input id="fColecao" placeholder="Ex: Verão 2026"></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Estilista</label><input id="fEstilista" placeholder="Nome do estilista"></div>
      <div class="fg"><label>Data de entrega</label><input type="date" id="fEntrega"></div>
    </div>
    <div class="fg"><label>Numeração</label><input id="fNum" placeholder="Ex: 36, 37, 38"></div>
    <div class="fg"><label>Observações de calce</label>
      <textarea id="fObs" placeholder="Ajuste, conforto, pontos de melhoria…"></textarea></div>
    <div class="fg-proto">
      <label>Protótipo atual</label>
      <select id="fProtoAtual">
        <option value="0">Nenhum iniciado</option>
        <option value="1">Photo 1</option>
        <option value="2">Photo 2</option>
        <option value="3">Photo 3</option>
        <option value="4">Photo 4</option>
        <option value="5">Photo 5</option>
      </select>
    </div>
    <hr class="sep">
    <div class="sec-title">Protótipos — Fotos e Observações</div>
    <div class="protos-form" id="protosForm"></div>
  </div>
  <div class="modal-ftr">
    <button class="btn" onclick="closeM('mCard')">Cancelar</button>
    <button class="btn btn-accent" onclick="saveCard()">Salvar</button>
  </div>
 </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('proto_data_v2') || '{"maquete":[],"amostra":[]}');
if (!data.maquete) data.maquete = [];
if (!data.amostra) data.amostra = [];
let curTab = 'maquete';
let curUser = localStorage.getItem('proto_user') || '';
let editId = null;
let tempImgs = {};

function save() { localStorage.setItem('proto_data_v2', JSON.stringify(data)); }
function cards() { return data[curTab]; }

function applyTabColors() {
  const isMaq = curTab === 'maquete';
  document.documentElement.style.setProperty('--active', isMaq ? '#534AB7' : '#1D9E75');
  document.documentElement.style.setProperty('--active-d', isMaq ? '#3C3489' : '#0F6E56');
  document.documentElement.style.setProperty('--active-l', isMaq ? '#EEEDFE' : '#E1F5EE');
}

function switchTab(tab) {
  curTab = tab;
  document.getElementById('tabMaq').classList.toggle('active', tab === 'maquete');
  document.getElementById('tabAmo').classList.toggle('active', tab === 'amostra');
  applyTabColors();
  document.getElementById('searchInput').value = '';
  document.getElementById('filterColecao').value = '';
  document.getElementById('filterStatus').value = '';
  renderCards();
}

function setUser() {
  const v = document.getElementById('unInput').value.trim(); if (!v) return;
  curUser = v; localStorage.setItem('proto_user', v);
  document.getElementById('unLabel').textContent = '✓ ' + v;
  document.getElementById('unLabel').style.display = 'inline';
  document.getElementById('unInput').style.display = 'none';
  document.getElementById('unBtn').style.display = 'none';
}
if (curUser) { document.getElementById('unInput').value = curUser; setUser(); }
function getUser() { return curUser || 'Anônimo'; }

function uColor(n){const c=['#534AB7','#1D9E75','#D85A30','#BA7517','#378ADD','#D4537E'];let h=0;for(const ch of(n||'?'))h=(h*31+ch.charCodeAt(0))%c.length;return c[h];}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'';try{const d=new Date(s);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return s;}}
function fmtDT(s){if(!s)return'';try{const d=new Date(s);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return s;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ── Resumo ─────────────────────────────────────────────────────
function renderResumo() {
  const list = cards();
  const total = list.length;
  const liberados = list.filter(c => c.liberado).length;
  const andamento = total - liberados;
  const porPhoto = [0,1,2,3,4,5].map(i => list.filter(c => (c.protoAtual||0) === i && !c.liberado).length);

  let html = `
    <div class="r-card andamento"><div class="r-num">${andamento}</div><div class="r-lbl">Em andamento</div></div>
    <div class="r-card liberado"><div class="r-num">${liberados}</div><div class="r-lbl">Liberados</div></div>
    <div class="r-card"><div class="r-num">${porPhoto[0]}</div><div class="r-lbl">Não iniciado</div></div>`;
  for (let i = 1; i <= 5; i++) {
    html += `<div class="r-card"><div class="r-num">${porPhoto[i]}</div><div class="r-lbl">Photo ${i}</div></div>`;
  }
  document.getElementById('resumoBar').innerHTML = html;
}

// ── Filtro coleção ─────────────────────────────────────────────
function updateColecaoFilter() {
  const sel = document.getElementById('filterColecao');
  const current = sel.value;
  const colecoes = [...new Set(cards().map(c => c.colecao).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas</option>' + colecoes.map(c => `<option value="${esc(c)}" ${c===current?'selected':''}>${esc(c)}</option>`).join('');
}

// ── Render cards ───────────────────────────────────────────────
function renderCards() {
  updateColecaoFilter();
  renderResumo();
  const grid = document.getElementById('grid');
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const fCol = document.getElementById('filterColecao').value;
  const fSt = document.getElementById('filterStatus').value;
  const cl = document.getElementById('searchClear');
  if (cl) cl.style.display = q ? 'block' : 'none';

  let filtered = cards();
  if (q) filtered = filtered.filter(c =>
    (c.ref||'').toLowerCase().includes(q)||(c.colecao||'').toLowerCase().includes(q)||
    (c.estilista||'').toLowerCase().includes(q)||(c.obs||'').toLowerCase().includes(q));
  if (fCol) filtered = filtered.filter(c => c.colecao === fCol);
  if (fSt === 'liberado') filtered = filtered.filter(c => c.liberado);
  if (fSt === 'andamento') filtered = filtered.filter(c => !c.liberado);

  document.getElementById('countLbl').textContent = `${filtered.length} registro${filtered.length!==1?'s':''} — ${curTab==='maquete'?'Protótipo':'Amostras'}`;

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="ico">${curTab==='maquete'?'🧩':'✅'}</div><h3>${q||fCol||fSt?'Nenhum resultado':'Nenhum registro ainda'}</h3><p>${q||fCol||fSt?'Tente outros filtros.':'Toque em "+ Novo registro" para começar.'}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

function renderCard(c) {
  const img = c.img ? `<img src="${c.img}" alt="">` : `<span style="font-size:24px">📷</span>`;
  const protoAtual = c.protoAtual || 0;

  // Barra de progresso
  const steps = [0,1,2,3,4,5].map(i => {
    const lbl = i === 0 ? '—' : `P${i}`;
    const cls = i < protoAtual ? 'feito' : i === protoAtual && i > 0 ? 'atual' : '';
    return `<div class="proto-step ${cls}">${lbl}</div>`;
  }).join('');

  // Protótipos
  const protos = [0,1,2,3,4].map(i => {
    const p = (c.protos||[])[i]||{};
    const pImg = p.img ? `<img src="${p.img}" alt="">` : `<span style="font-size:14px">📷</span>`;
    return `<div class="proto-item">
      <div class="proto-img" onclick="clickProtoImg('${c.id}',${i})">
        ${pImg}<div class="hint">📷</div>
        <input type="file" id="pi-${c.id}-${i}" accept="image/*" onchange="onProtoImg(event,'${c.id}',${i})" style="display:none">
      </div>
      <div class="proto-lbl">Photo ${i+1}</div>
      <div class="proto-obs ${p.obs?'':'empty'}">${p.obs?esc(p.obs):'—'}</div>
    </div>`;
  }).join('');

  const cmts = c.comments||[];
  const cmtHtml = cmts.slice(-2).map(cm=>`
    <div class="cmt-item">
      <div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div>
      <div class="cmt-body">
        <div class="cmt-user">${esc(cm.user)}</div>
        <div class="cmt-text">${esc(cm.text)}</div>
        <div class="cmt-time">${fmtDT(cm.ts)}</div>
      </div>
    </div>`).join('');

  const liberadoBtn = c.liberado
    ? `<span class="liberar-info ok">✅ Liberado por ${esc(c.liberadoPor||'—')} em ${fmtDate(c.liberadoEm)}</span>
       <button class="btn btn-sm btn-danger" onclick="toggleLiberar('${c.id}')">Desfazer</button>`
    : `<span class="liberar-info">Aprovar e liberar para Amostras</span>
       <button class="btn btn-sm btn-liberado" onclick="toggleLiberar('${c.id}')">✅ Liberar</button>`;

  return `<div class="card ${c.liberado?'liberado':''}" id="c-${c.id}">
    <div class="card-header">
      <div class="card-img" onclick="clickImg('${c.id}')">
        ${img}<div class="hint">📷 Trocar</div>
        <input type="file" id="fi-${c.id}" accept="image/*" onchange="onCardImg(event,'${c.id}')" style="display:none">
      </div>
      <div class="card-info">
        <div class="card-ref">
          ${esc(c.ref||'Sem ref.')}
          ${c.liberado?'<span class="liberado-badge">✅ Liberado</span>':''}
        </div>
        <div class="card-meta">👗 ${esc(c.colecao||'—')} · ✏️ ${esc(c.estilista||'—')}</div>
        ${c.num?`<div class="card-meta">Nº ${esc(c.num)}</div>`:''}
        ${c.entrega?`<div class="card-meta">📅 Entrega: ${fmtDate(c.entrega)}</div>`:''}
      </div>
      <div class="card-actions">
        <button class="card-act" onclick="openEdit('${c.id}')">✏️</button>
        <button class="card-act danger" onclick="delCard('${c.id}')">🗑</button>
      </div>
    </div>

    <div class="proto-progress">
      <div class="proto-progress-lbl">
        <span>Progresso dos protótipos</span>
        <span style="color:var(--maq);font-weight:700">${protoAtual===0?'Não iniciado':'Photo '+protoAtual+' em andamento'}</span>
      </div>
      <div class="proto-steps">${steps}</div>
    </div>

    <div class="sec">
      <div class="sec-lbl"><span><span class="dot d-info"></span>Observações de calce</span></div>
      <div class="obs-box ${c.obs?'':'obs-empty'}">${c.obs?esc(c.obs):'Nenhuma observação registrada.'}</div>
    </div>

    <div class="sec">
      <div class="sec-lbl"><span><span class="dot d-maq"></span>Protótipos</span></div>
      <div class="protos-grid">${protos}</div>
    </div>

    <div class="liberar-sec">${liberadoBtn}</div>

    <div class="cmt-sec">
      <div class="sec-lbl" style="margin-bottom:8px"><span><span class="dot d-maq"></span>Comentários (${cmts.length})</span></div>
      ${!cmts.length?'<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:6px">Sem comentários ainda.</div>':''}
      ${cmtHtml}
      ${cmts.length>2?`<button class="more-btn" onclick="allComments('${c.id}')">Ver todos os ${cmts.length} comentários</button>`:''}
      <div class="cmt-row">
        <div class="avatar" style="background:${uColor(getUser())}22;color:${uColor(getUser())}">${initials(getUser())}</div>
        <input class="cmt-input" id="ci-${c.id}" placeholder="Comentar…" onkeydown="if(event.key==='Enter')addComment('${c.id}')">
        <button class="btn btn-sm btn-accent" onclick="addComment('${c.id}')">↑</button>
      </div>
    </div>
  </div>`;
}

// ── Liberar ────────────────────────────────────────────────────
function toggleLiberar(id) {
  const i = cards().findIndex(c => c.id === id); if (i < 0) return;
  if (data[curTab][i].liberado) {
    if (!confirm('Desfazer liberação?')) return;
    data[curTab][i].liberado = false;
    data[curTab][i].liberadoPor = null;
    data[curTab][i].liberadoEm = null;
    toast('↩️ Liberação desfeita');
  } else {
    data[curTab][i].liberado = true;
    data[curTab][i].liberadoPor = getUser();
    data[curTab][i].liberadoEm = new Date().toISOString();
    toast('✅ Liberado para Amostras!', 3000);
  }
  save(); renderCards();
}

// ── Imagens ────────────────────────────────────────────────────
function compressImg(file,cb,maxPx=600){const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>maxPx){h=Math.round(h*maxPx/w);w=maxPx;}}else{if(h>maxPx){w=Math.round(w*maxPx/h);h=maxPx;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.75));};img.src=ev.target.result;};r.readAsDataURL(file);}

function clickImg(id){document.getElementById('fi-'+id).click();}
function onCardImg(e,id){const f=e.target.files[0];if(!f)return;compressImg(f,b=>{const i=cards().findIndex(c=>c.id===id);if(i<0)return;data[curTab][i].img=b;save();renderCards();});}
function clickProtoImg(id,pi){document.getElementById(`pi-${id}-${pi}`).click();}
function onProtoImg(e,id,pi){const f=e.target.files[0];if(!f)return;compressImg(f,b=>{const i=cards().findIndex(c=>c.id===id);if(i<0)return;if(!data[curTab][i].protos)data[curTab][i].protos=[{},{},{},{},{}];data[curTab][i].protos[pi]={...data[curTab][i].protos[pi],img:b};save();renderCards();},400);}
function onImgFile(e,key){const f=e.target.files[0];if(!f)return;compressImg(f,b=>{tempImgs[key]=b;if(key==='main'){const d=document.getElementById('imgDrop');d.innerHTML=`<img src="${b}">`;}else{const el=document.getElementById('pf-img-'+key);if(el)el.innerHTML=`<img src="${b}">`;}});}

// ── Form protótipos ────────────────────────────────────────────
function renderProtosForm(protos) {
  document.getElementById('protosForm').innerHTML = [0,1,2,3,4].map(i => {
    const p = (protos||[])[i]||{};
    const imgSrc = tempImgs['p'+i] || p.img;
    return `<div class="pf-col">
      <div class="pf-col-lbl">Photo ${i+1}</div>
      <div class="pf-img-sm" id="pf-img-p${i}" onclick="document.getElementById('pf-file-p${i}').click()">
        ${imgSrc?`<img src="${imgSrc}">`:'<span>📷</span>'}<div class="hint">📷</div>
        <input type="file" id="pf-file-p${i}" accept="image/*" onchange="onImgFile(event,'p${i}')" style="display:none">
      </div>
      <textarea class="pf-obs" id="pf-obs-p${i}" placeholder="Obs…">${esc(p.obs||'')}</textarea>
    </div>`;
  }).join('');
}

// ── CRUD ───────────────────────────────────────────────────────
function openNew(){
  editId=null; tempImgs={};
  document.getElementById('mCardTitle').textContent='Novo — '+(curTab==='maquete'?'Protótipo':'Amostras');
  ['fRef','fColecao','fEstilista','fNum','fObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fEntrega').value='';
  document.getElementById('fProtoAtual').value='0';
  document.getElementById('imgDrop').innerHTML='<span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>';
  renderProtosForm([]);
  document.getElementById('mCard').style.display='flex';
}

function openEdit(id){
  const c=cards().find(x=>x.id===id);if(!c)return;
  editId=id; tempImgs={};
  document.getElementById('mCardTitle').textContent='Editar — '+(curTab==='maquete'?'Protótipo':'Amostras');
  document.getElementById('fRef').value=c.ref||'';
  document.getElementById('fColecao').value=c.colecao||'';
  document.getElementById('fEstilista').value=c.estilista||'';
  document.getElementById('fNum').value=c.num||'';
  document.getElementById('fObs').value=c.obs||'';
  document.getElementById('fEntrega').value=c.entrega||'';
  document.getElementById('fProtoAtual').value=String(c.protoAtual||0);
  document.getElementById('imgDrop').innerHTML=c.img?`<img src="${c.img}">`:'<span>📷</span><div class="img-drop-lbl">Toque para adicionar foto</div>';
  renderProtosForm(c.protos||[]);
  document.getElementById('mCard').style.display='flex';
}

function saveCard(){
  const ref=document.getElementById('fRef').value.trim();
  if(!ref){alert('Informe a referência.');return;}
  const protos=[0,1,2,3,4].map(i=>({
    img:tempImgs['p'+i]||((editId&&(cards().find(x=>x.id===editId)?.protos||[])[i]?.img))||null,
    obs:document.getElementById('pf-obs-p'+i)?.value.trim()||''
  }));
  const obj={ref,colecao:document.getElementById('fColecao').value.trim(),estilista:document.getElementById('fEstilista').value.trim(),
    num:document.getElementById('fNum').value.trim(),entrega:document.getElementById('fEntrega').value,
    obs:document.getElementById('fObs').value.trim(),protoAtual:parseInt(document.getElementById('fProtoAtual').value)||0,protos};
  if(tempImgs.main)obj.img=tempImgs.main;
  if(editId){const i=cards().findIndex(c=>c.id===editId);if(i>=0)Object.assign(data[curTab][i],obj);}
  else{data[curTab].unshift({id:uid(),comments:[],createdAt:new Date().toISOString(),...obj});}
  save();closeM('mCard');renderCards();toast('✅ Salvo!');
}

function delCard(id){if(!confirm('Excluir este registro?'))return;data[curTab]=data[curTab].filter(c=>c.id!==id);save();renderCards();toast('🗑 Excluído');}

function addComment(id){const inp=document.getElementById('ci-'+id);const text=inp.value.trim();if(!text)return;const i=cards().findIndex(c=>c.id===id);if(i<0)return;if(!data[curTab][i].comments)data[curTab][i].comments=[];data[curTab][i].comments.push({user:getUser(),text,ts:new Date().toISOString()});inp.value='';save();renderCards();document.getElementById('ci-'+id)?.focus();}

function allComments(id){const c=cards().find(x=>x.id===id);if(!c)return;const html=(c.comments||[]).map(cm=>`<div class="cmt-item" style="margin-bottom:10px"><div class="avatar" style="background:${uColor(cm.user)}22;color:${uColor(cm.user)}">${initials(cm.user)}</div><div class="cmt-body"><div class="cmt-user">${esc(cm.user)}</div><div class="cmt-text">${esc(cm.text)}</div><div class="cmt-time">${fmtDT(cm.ts)}</div></div></div>`).join('');const m=document.createElement('div');m.className='overlay';m.id='mAll';m.onclick=e=>{if(e.target===m)m.remove()};m.innerHTML=`<div class="modal"><div class="modal-hdr"><h3>Comentários — ${esc(c.ref)}</h3><button class="btn btn-sm" onclick="document.getElementById('mAll').remove()">✕</button></div><div class="modal-body" style="max-height:70vh;overflow-y:auto">${html}</div></div>`;document.body.appendChild(m);}

function compartilhar(){const semFoto={maquete:data.maquete.map(c=>{const{img,...r}=c;return{...r,protos:(c.protos||[]).map(p=>{const{img:pi,...pr}=p;return pr;})}}),amostra:data.amostra.map(c=>{const{img,...r}=c;return{...r,protos:(c.protos||[]).map(p=>{const{img:pi,...pr}=p;return pr;})}})};const dados=JSON.stringify({v:2,data:semFoto,de:getUser(),ts:new Date().toISOString()});const b64=btoa(unescape(encodeURIComponent(dados)));const url=window.location.href.split('?')[0]+'?dados='+b64;const msg=encodeURIComponent('👠 *Protótipo & Amostras — Atualização*\nEnviado por: '+getUser()+'\nProtótipo: '+data.maquete.length+' · Amostras: '+data.amostra.length+'\n\nAbra o link para importar:\n'+url);window.open('https://wa.me/?text='+msg,'_blank');}

function exportarJSON(){const json=JSON.stringify({v:2,data,exportadoPor:getUser(),ts:new Date().toISOString()});const blob=new Blob([json],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='prototipo-backup-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.json';a.click();toast('💾 Backup exportado!');}

function checkImport(){const params=new URLSearchParams(window.location.search);const dados=params.get('dados');if(!dados)return;try{const obj=JSON.parse(decodeURIComponent(escape(atob(dados))));if(!obj.data)return;window._pendingImport=obj;const total=(obj.data.maquete||[]).length+(obj.data.amostra||[]).length;document.getElementById('importInfo').textContent=` ${total} registro(s) de ${obj.de||'alguém'}`;document.getElementById('importBanner').style.display='block';window.history.replaceState({},'',window.location.pathname);}catch(e){}}

function confirmarImport(){const obj=window._pendingImport;if(!obj)return;['maquete','amostra'].forEach(tab=>{(obj.data[tab]||[]).forEach(nc=>{const idx=data[tab].findIndex(c=>c.id===nc.id);if(idx>=0){const cmtsExist=new Set((data[tab][idx].comments||[]).map(c=>c.ts+c.user));const novosCmts=(nc.comments||[]).filter(c=>!cmtsExist.has(c.ts+c.user));data[tab][idx].comments=[...(data[tab][idx].comments||[]),...novosCmts];const img=data[tab][idx].img;const protos=data[tab][idx].protos;Object.assign(data[tab][idx],nc);if(img)data[tab][idx].img=img;if(protos)data[tab][idx].protos=protos;}else{data[tab].unshift(nc);}});});save();renderCards();document.getElementById('importBanner').style.display='none';toast('✅ Dados importados!',3000);}

function closeM(id){document.getElementById(id).style.display='none';}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeM(id);}

checkImport();
renderCards();
</script>
</body>
</html>
